<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /bluearch/</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #f4f4f4; color: #333; padding: 20px; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; font-size: 24px; color: #000; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #333; color: #fff; }
        tr:hover { background: #f1f1f1; }
        a { color: #0066cc; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .footer { margin-top: 30px; border-top: 2px solid #000; padding-top: 15px; font-size: 13px; color: #444; font-weight: bold; }
        .size-cell { white-space: nowrap; }
        .error-msg { color: #d9534f; font-weight: bold; padding: 10px; border: 1px solid #d9534f; display: none; }
        .type-dir { color: #e67e22; font-weight: bold; } /* Klasörleri ayırmak için */
    </style>
</head>
<body>

<h1>BlueArch Linux | Root Repository Index</h1>

<div id="error-banner" class="error-msg">Error: Unable to fetch repository data. API rate limit might be reached.</div>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Last Modified</th>
            <th>Size</th>
        </tr>
    </thead>
    <tbody id="file-list">
        </tbody>
</table>

<div class="footer">
    BlueArch Network Mirror System — Maintained by p1rater
</div>

<script>
    const CONFIG = {
        username: 'p1rater',
        repo: 'BlueArch-Repo',
        branch: 'main',
        directory: '' // Ana dizin için boş bırakıldı
    };

    async function fetchRepoContents() {
        const listElement = document.getElementById('file-list');
        const errorBanner = document.getElementById('error-banner');

        try {
            const apiUrl = `https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/${CONFIG.directory}?ref=${CONFIG.branch}`;
            const response = await fetch(apiUrl);
            
            if (!response.ok) throw new Error('Network response was not ok');
            
            const files = await response.json();

            // index.html ve gizli dosyaları filtrele
            const filteredFiles = files
                .filter(file => file.name !== 'index.html' && !file.name.startsWith('.'))
                .sort((a, b) => {
                    // Önce klasörleri göster
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

            filteredFiles.forEach(file => {
                const tr = document.createElement('tr');
                const isDir = file.type === 'dir';
                
                // Klasörler için boyut gösterme, dosyalar için MB'a çevir
                const sizeDisplay = isDir ? "-" : (file.size / (1024 * 1024)).toFixed(2) + " MB";
                const typeDisplay = isDir ? "[DIR]" : "[FILE]";
                const dateStr = new Date().toISOString().split('T')[0];

                tr.innerHTML = `
                    <td><a href="${isDir ? file.name + '/' : file.download_url}">${file.name}${isDir ? '/' : ''}</a></td>
                    <td class="${isDir ? 'type-dir' : ''}">${typeDisplay}</td>
                    <td>${dateStr}</td>
                    <td class="size-cell">${sizeDisplay}</td>
                `;
                listElement.appendChild(tr);
            });

        } catch (error) {
            console.error("Repository fetch error:", error);
            errorBanner.style.display = 'block';
        }
    }

    fetchRepoContents();
</script>

</body>
</html>
